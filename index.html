<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background 0.5s, color 0.5s;
    }

    body.dark {
      background: #121212;
      color: #eee;
    }

    .login-container {
      background: #fff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      width: 350px;
      text-align: center;
      transition: background 0.5s, color 0.5s;
    }

    body.dark .login-container {
      background: #1e1e1e;
      color: #eee;
    }

    .login-container h2 {
      margin-bottom: 20px;
    }

    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .input-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    body.dark .input-group input {
      background: #2a2a2a;
      border: 1px solid #555;
      color: #eee;
    }

    .input-group input:focus {
      border-color: #2575fc;
      outline: none;
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      background: #2575fc;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .login-btn:hover {
      background: #1a5edb;
    }

    .extra-links {
      margin-top: 15px;
      font-size: 14px;
    }

    .extra-links a {
      color: #2575fc;
      text-decoration: none;
      margin: 0 5px;
    }

    .extra-links a:hover {
      text-decoration: underline;
    }

    .social-login {
      margin-top: 20px;
    }

    .social-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 10px;
      transition: opacity 0.3s;
    }

    .social-btn.google {
      background: #db4437;
      color: #fff;
    }

    .social-btn.facebook {
      background: #4267B2;
      color: #fff;
    }

    .social-btn:hover {
      opacity: 0.85;
    }

    .toggle-btn {
      margin-top: 15px;
      cursor: pointer;
      font-size: 14px;
      color: #2575fc;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>Welcome Back</h2>
    <form>
      <div class="input-group">
        <label for="username">Email</label>
        <input type="email" id="username" placeholder="Enter your email" required>
      </div>
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="login-btn">Login</button>
    </form>
    <div class="social-login">
      <button class="social-btn google">Login with Google</button>
      <button class="social-btn facebook">Login with Facebook</button>
    </div>
    <div class="extra-links">
      <a href="#">Forgot Password?</a> | <a href="#">Sign Up</a>
    </div>
    <div class="toggle-btn" onclick="toggleDarkMode()">🌙 Toggle Dark Mode</div>
  </div>

  <script>
    function toggleDarkMode() {
      document.body.classList.toggle('dark');
    }
  </script>
</body>
</html>
